<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Text Viewer</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #222222;
      --muted: #666666;
      --border: #d8d8d8;
      --panel: #f7f7f7;
      --error: #b00020;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1f1f1f;
        --fg: #e8e8e8;
        --muted: #b4b4b4;
        --border: #484848;
        --panel: #2b2b2b;
        --error: #ffb4ab;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .55rem .75rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      min-height: 2.75rem;
    }
    header .title {
      flex: 1 1 auto;
      min-width: 0;
      color: var(--muted);
      font-size: .9rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    header a, header button {
      border: 1px solid var(--border);
      border-radius: .35rem;
      background: var(--bg);
      color: var(--fg);
      padding: .25rem .55rem;
      font: inherit;
      font-size: .85rem;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    main { padding: 0; }
    pre {
      margin: 0;
      padding: 1rem;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      tab-size: 2;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      line-height: 1.55;
    }
    .message {
      padding: 1rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .message.error { color: var(--error); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <div id="title" class="title">Text Viewer</div>
    <button id="wrapButton" type="button">No wrap</button>
    <a id="openOriginal" href="#" target="_blank" rel="noopener noreferrer">Open original</a>
  </header>
  <main>
    <div id="message" class="message">Loading...</div>
    <pre id="textBody" class="hidden"></pre>
  </main>

  <script>
    (function () {
      'use strict';

      var params = new URLSearchParams(window.location.search || '');
      var source = params.get('file') || params.get('src') || params.get('url') || '';
      var message = document.getElementById('message');
      var textBody = document.getElementById('textBody');
      var title = document.getElementById('title');
      var openOriginal = document.getElementById('openOriginal');
      var wrapButton = document.getElementById('wrapButton');
      var wrap = true;

      function isJapanese() {
        return /^ja/i.test(navigator.language || document.documentElement.lang || '');
      }

      function label(en, ja) {
        return isJapanese() ? ja : en;
      }

      function setMessage(text, isError) {
        message.textContent = text;
        message.className = isError ? 'message error' : 'message';
        message.classList.remove('hidden');
        textBody.classList.add('hidden');
      }

      function setText(text) {
        textBody.textContent = text;
        textBody.classList.remove('hidden');
        message.classList.add('hidden');
      }

      function toDisplayName(url) {
        var decoded = url;
        try { decoded = decodeURIComponent(url); } catch (e) { decoded = url; }
        return decoded;
      }

      function resolveSource(value) {
        var url;
        value = String(value || '').trim();
        if (!value) { return ''; }
        if (/^\/\//.test(value)) {
          value = window.location.protocol + value;
        }
        try {
          url = new URL(value, window.location.href);
        }
        catch (e) {
          return '';
        }
        if (!/^(https?:|blob:|data:)$/i.test(url.protocol)) {
          return '';
        }
        return url.href;
      }

      async function loadText(url) {
        var controller = new AbortController();
        var timer = window.setTimeout(function () {
          controller.abort();
        }, 20000);
        try {
          var response = await fetch(url, {
            credentials: new URL(url, window.location.href).origin === window.location.origin ? 'same-origin' : 'omit',
            signal: controller.signal
          });
          if (!response.ok) {
            throw new Error('HTTP ' + response.status);
          }
          return await response.text();
        }
        finally {
          window.clearTimeout(timer);
        }
      }

      function applyWrap() {
        textBody.style.whiteSpace = wrap ? 'pre-wrap' : 'pre';
        textBody.style.overflowX = wrap ? 'hidden' : 'auto';
        wrapButton.textContent = wrap ? label('No wrap', '折り返さない') : label('Wrap', '折り返す');
      }

      wrapButton.addEventListener('click', function () {
        wrap = !wrap;
        applyWrap();
      });

      async function init() {
        var url = resolveSource(source);
        applyWrap();
        if (!url) {
          openOriginal.classList.add('hidden');
          setMessage(label('No text file was specified.', '表示するテキストファイルが指定されていません。'), true);
          return;
        }

        title.textContent = toDisplayName(url);
        openOriginal.href = url;

        try {
          setMessage(label('Loading...', '読み込み中...'), false);
          setText(await loadText(url));
        }
        catch (e) {
          setMessage(
            label(
              'This text file could not be displayed in the viewer. Use Open original to open it directly.',
              'このテキストファイルをビューアーで表示できませんでした。Open original から直接開いてください。'
            ),
            true
          );
          console.error(e);
        }
      }

      init();
    }());
  </script>
</body>
</html>
