  <div id="edit" class="w3-card" style="display: none;"></div>
  <div id="info" class="w3-card" style="display: none;"></div>
  <div id="search" class="w3-card" style="display: none;"></div>
  <div id="filter" class="w3-card" style="display: none;"></div>

  <div id="modal" class="w3-card" style="display: none;"></div>

  <div id="snackbar"></div>

  <div style="display: none;">
    <span id="em" style="font-size: 1em; height: 1em;">0123456789abcdefghijklmnopqrstuvwxyz</span>
    <textarea id="LFtextarea"></textarea>
  </div>

  <script type="text/javascript">
    (async function () {
      // If no query string is present, pass an empty string to initModule().
      const param = (window.location && typeof window.location.search === 'string')
        ? window.location.search.slice(1)
        : '';
      console.log(`WuWei(app2) Start. param:${param}`);

      // always pass a string
      await wuwei.initModule(param || '');

      window.addEventListener('beforeunload', (event) => {
        event.preventDefault();
        event.returnValue = '';
      });
    })();
  </script>
